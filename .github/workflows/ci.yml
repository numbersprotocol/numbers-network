name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: find . -name "*.sh" -print0 | xargs -0 shellcheck --severity=warning

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          find . -name "*.json" -print0 | while IFS= read -r -d '' f; do
            echo "Validating $f"
            python3 -m json.tool "$f" > /dev/null
          done

  rpc-tests:
    name: RPC Tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r rpc/requirements.txt
      - name: Run RPC tests
        run: pytest rpc/rpc_test.py -v
        timeout-minutes: 5
